<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>"Gym Membership Registration Form"</h3>
    <form>
        <input type="text" placeholder="Enter Your Full Name">
        <br><br>
        <input type="email" placeholder="Enter Your email">
        <br><br>
        <input type="number" placeholder="Enter Your Phone Number">
        <br><br>


        <h4>Select Your Date Of Birth</h4>
        <input type="date">
        <br><br>


        <h4>Select Your Gender</h4>
        <input type="radio" name="gender">Male
        <br>
        <input type="radio" name="gender">Female
        <br><br>


        <h4>Select Your Membership Plan</h4>
        <select>
            <option>Basic</option>
            <option>Standard</option>
            <option>Premium</option>
        </select>
        <br><br>


        <h4>Select Your Interests Area</h4>
        <label>
            <input type="checkbox" name="workout">Weight
            <Br>
            <input type="checkbox" name="workout">Swimming
            <br>
            <input type="checkbox" name="workout">Yoga
            <br>
            <input type="checkbox" name="workout">Pilates
            <br><br><br></br>
        </label>


        <textarea type="textarea" rows="15" cols="30" placeholder="Messge/Goal"></textarea>
        <br><br>

        <input type="submit" value="Join Now">
    </form>

    
</body>
</html>
